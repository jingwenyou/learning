- case_name: mtu为空
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"${gen_ipv4()}","masklen":24,"type":"ipv4"}],'mtu':null}
  expect: {"data":"","code":0}
