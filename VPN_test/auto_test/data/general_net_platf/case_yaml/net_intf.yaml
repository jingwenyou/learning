cases:
- case_name: 正常-内网口配置单个IPv4静态地址,mtu1280
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"${gen_ipv4()}","masklen":24,"type":"ipv4"}],"mtu":1280}
  expect: {"data":"","code":0}
- case_name: 正常-内网口配置2个IPv4静态地址,mtu1500
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"${gen_ipv4()}","masklen":24,"type":"ipv4"},
    {"ipaddr":"2.2.2.254","masklen":24,"type":"ipv4"}],"mtu":1500}
  expect: {"data":"","code":0}
- case_name: 正常-内配置单个IPv6静态地址,mtu2048
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"${gen_ipv6_addr()}","masklen":128,"type":"ipv6"}],"mtu":2048}
  expect: {"data":"","code":0}
- case_name: 正常-内网口配置10个IPv6静态地址,mtu1500
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"${gen_ipv6_addr()}","masklen":96,"type":"ipv6"},
  {"ipaddr":"${gen_ipv6_addr()}","masklen":24,"type":"ipv6"},{"ipaddr":"${gen_ipv6_addr()}","masklen":127,"type":"ipv6"},
  {"ipaddr":"${gen_ipv6_addr()}","masklen":24,"type":"ipv6"},{"ipaddr":"0005:0005:0005::0005","masklen":24,"type":"ipv6"},
  {"ipaddr":"6:6:600A::FFF6","masklen":96,"type":"ipv6"},{"ipaddr":"a::a","masklen":24,"type":"ipv6"},
  {"ipaddr":"aaaa:aaaa:aaaa:aaaa:aaaa:aaaa:aaaa:aaaa","masklen":124,"type":"ipv6"},{"ipaddr":"002F:FFFF:FFFF:FFFF:FFFF:FFFF:FFFF:1F2F","masklen":56,"type":"ipv6"},
  {"ipaddr":"${gen_ipv6_addr()}","masklen":24,"type":"ipv6"}],"mtu":1280}
  expect: {"data":"","code":0}
- case_name: 正常-内网口配置1个IPv4地址,1个IPv6地址,mtu9000
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"10.1.1.9","masklen":24,"type":"ipv4"},
  {"ipaddr":"2222:2222:3333:4444:5555:6666:7777:abef","masklen":96,"type":"ipv6"}],"mtu":9000}
  expect: {"data":"","code":0}
- case_name: 正常-内网口配置2个IPv6静态地址,mtu8999
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"${gen_ipv6_addr()}","masklen":24,"type":"ipv6"},
  {"ipaddr":"${gen_ipv6_addr()}","masklen":96,"type":"ipv6"}],"mtu":8999}
  expect: {"data":"","code":0}
- case_name: 正常-内网口配置单个IPv4静态地址-复杂写法,mtu1500
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"001.001.000.010","masklen":24,"type":"ipv4"}],"mtu":1500}
  expect: {"data":"","code":0}
- case_name: 正常-内网口配置单个IPv4静态地址-复杂写法,mtu1500
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"001.001.000.010","masklen":24,"type":"ipv4"}],"mtu":1500}
  expect: {"data":"","code":0}
- case_name: 正常-外网口配置ipv6静态地址-复杂写法,mtu1500
  payload: {"name":"eth1","role":"wan","proto":"static","ipaddrs":[{"ipaddr":"1111:aaaa:bbbb:0:00:ffff:0000:0000","masklen":0,"type":"ipv6"}],"mtu":1500}
  expect: {"data":"","code":0}
