  add_res: {'type': 'bonding', 'bond_mode': 'balance-rr', 'mtu': '1500', 'miimon': '100', 'masklen': 16, 'mii_status': 'up', 'name': 'bond1',
          'ipaddr': '127.0.0.1', 'proto': 'static', 'ifname': 'eth2'}
