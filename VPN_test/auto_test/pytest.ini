[pytest]
addopts = -vs -p no:warnings
testpath = ./testcase/
python_files = 'test_*.py'
python_classes = 'Test*'
python_functions = 'test_*'
markers = 
    smoke: maoyan
    all: every
    hsm: hsm_server
    svs: Signing_and_verification
    vpn: vpn
    order: control test execution order
