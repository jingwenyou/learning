cases:
- case_name: 配置dns,IPv4,IPv6
  set_dns: {"server4": "${gen_ipv4()}","server6": "${gen_ipv6_addr()}"}
  change_nds: {"server6": "${gen_ipv6_addr()}"}
- case_name: 配置dns,IPv6
  set_dns: {"server4": "${gen_ipv4()}","server6": "${gen_ipv6_addr()}"}
  change_nds: {"server4": "${gen_ipv4()}"}
