cases:
- case_name: 添加ipv4路由
  add_paras: {'type':'ipv4','target':'${gen_ipv4()}','masklen':32,'gateway':'9.9.9.9'}
  change_paras: {'type':'ipv4','target':'${gen_ipv4()}','masklen':24,'gateway':'8.8.8.8'}
- case_name: 添加ipv4路由,修改目的地址,
  add_paras: {'type':'ipv4','target':'10.10.1.1','masklen':32,'gateway':'9.9.9.9'}
  change_paras: {'type':'ipv4','target':'${gen_ipv4()}','masklen':24,'gateway':'9.9.9.9'}
- case_name: 修改与添加参数一致
  add_paras: {'type':'ipv4','target':'11.11.11.11','masklen':24,'gateway':'8.8.8.8'}
  change_paras: {'type':'ipv4','target':'11.11.11.11','masklen':24,'gateway':'8.8.8.8'}
- case_name: 添加ipv6路由
  add_paras: {'type':'ipv6','target':'${gen_ipv6_addr()}','masklen':'127','gateway':'${gen_ipv6_addr()}'}
  change_paras: {'type':'ipv6','target':'${gen_ipv6_addr()}','masklen':'96','gateway':'${gen_ipv6_addr()}'}
- case_name: 添加ipv6路由
  add_paras: {'type':'ipv6','target':'${gen_ipv6_addr()}','masklen':'24','gateway':'${gen_ipv6_addr()}'}
  change_paras: {'type':'ipv6','target':'${gen_ipv6_addr()}','masklen':'32','gateway':'${gen_ipv6_addr()}'}
- case_name: 添加ipv4默认路由
  add_paras: {'type':'ipv4','target':'0.0.0.0','masklen':0,'gateway':'9.9.9.10'}
  change_paras: {'type':'ipv4','target':'10.10.1.1','masklen':32,'gateway':'9.9.9.9'}
- case_name: 添加ipv6默认路由
  add_paras: {'type':'ipv6','target':'::','masklen':'0','gateway':'aaaa:aaaa:aaaa:aaaa:AAAA:AAAA:AAAA:AAAA'}
  change_paras: {'type':'ipv6','target':'::','masklen':'0','gateway':'aaaa:aaaa:aaaa:aaaa:AAAA:AAAA:AAAA:AAAb'}
- case_name: 异常添加-添加ipv4路由,目的地址IPV6
  add_paras: {'type':'ipv6','target':'9999:9999:9999::9','masklen':'96','gateway':'3.3.3.3'}
  change_paras: {'type':'ipv4','target':'10.10.1.1','masklen':32,'gateway':'9.9.9.9'}
- case_name: 异常添加-添加ipv6路由,目的地址IPV4
  add_paras: {'type':'ipv4','target':'9.9.9.9','masklen':96,'gateway':'5::5'}
  change_paras: {'type':'ipv4','target':'10.10.1.1','masklen':32,'gateway':'9.9.9.9'}
# - case_name: 异常添加-添加路由,网口名为空
#   add_paras: {'type':'ipv4','target':'1.1.1.1','masklen':32,'gateway':'3.3.3.3'}
#   change_paras: {'type':'ipv4','target':'10.10.1.1','masklen':32,'gateway':'9.9.9.9'}
- case_name: 异常添加-添加路由,目的地址为空
  add_paras: {'type':'ipv4','target':null,'masklen':24,'gateway':'3.3.3.3'}
  change_paras: {'type':'ipv4','target':'10.10.1.1','masklen':32,'gateway':'9.9.9.9'}
- case_name: 异常添加-添加路由,目的地址掩码为空
  add_paras: {'type':'ipv6','target':'9999:9999:9999::9','masklen':null,'gateway':'3.3.3.3'}
- case_name: 异常添加-添加路由,网关为空
  add_paras: {'type':'ipv6','target':'9999:9999:9999::9','masklen':96,'gateway':NULL}
- case_name: 异常添加-添加路由,网关IP地址类型错误
  add_paras: {'type':'ipv4','target':'1.1.3.2','masklen':96,'gateway':'4'}